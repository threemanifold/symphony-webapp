<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Symphony Chat</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #1f2933;
        background: #f4f7f9;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 680px);
      }

      h1 {
        margin: 0 0 18px;
        font-size: clamp(2rem, 8vw, 3.75rem);
        line-height: 1;
        color: #102a43;
        letter-spacing: 0;
      }

      form {
        display: grid;
        gap: 12px;
        grid-template-columns: 1fr auto;
        align-items: stretch;
      }

      label {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
      }

      input {
        min-width: 0;
        border: 1px solid #bcccdc;
        border-radius: 8px;
        padding: 14px 16px;
        font: inherit;
        background: #ffffff;
        color: #102a43;
      }

      input:focus {
        outline: 3px solid #9fb3c8;
        outline-offset: 2px;
      }

      button {
        border: 0;
        border-radius: 8px;
        padding: 0 20px;
        min-width: 96px;
        font: inherit;
        font-weight: 700;
        color: #ffffff;
        background: #0b7285;
        cursor: pointer;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.68;
      }

      output {
        display: block;
        min-height: 88px;
        margin-top: 16px;
        padding: 18px;
        border: 1px solid #d9e2ec;
        border-radius: 8px;
        background: #ffffff;
        color: #334e68;
        line-height: 1.5;
        overflow-wrap: anywhere;
      }

      @media (max-width: 520px) {
        body {
          place-items: start stretch;
          padding: 18px;
        }

        form {
          grid-template-columns: 1fr;
        }

        button {
          min-height: 48px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Symphony Chat</h1>
      <form data-chat-form>
        <label for="message">Message</label>
        <input id="message" data-chat-input name="message" type="text" autocomplete="off" placeholder="Type one message">
        <button data-chat-submit type="submit">Send</button>
      </form>
      <output data-chat-output aria-live="polite">Response will appear here.</output>
    </main>
    <script type="module" src="/chat.mjs"></script>
  </body>
</html>
